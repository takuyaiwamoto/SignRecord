<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Video</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      video {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #000;
        object-fit: contain;
      }

      .error {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 32px;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        line-height: 1.6;
        text-align: center;
        background: #000;
      }

      .error.is-visible {
        display: grid;
      }
    </style>
  </head>
  <body>
    <video id="demo-video" playsinline preload="auto"></video>
    <div class="error" id="video-error"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const source = params.get('src');
      const video = document.getElementById('demo-video');
      const error = document.getElementById('video-error');

      function showError(message) {
        error.textContent = message;
        error.classList.add('is-visible');
      }

      if (!source) {
        showError('動画ファイルが指定されていません');
      } else {
        video.src = source;
        video.load();
      }

      video.addEventListener('loadedmetadata', () => {
        if (Number.isFinite(video.duration) && video.duration > 0.6) {
          video.currentTime = 0.5;
        }
      });

      video.addEventListener('error', () => {
        const code = video.error ? video.error.code : 'unknown';
        showError(`動画を読み込めません: ${code}`);
      });
    </script>
  </body>
</html>
