<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Replay</title>
    <link rel="stylesheet" href="./replay.css" />
  </head>
  <body>
    <main class="app app-choosing" id="app">
      <section class="chooser" id="chooser">
        <header>
          <p class="eyebrow">Local Sign Replay</p>
          <h1>どのサインを書く？</h1>
          <p id="status" role="status" aria-live="polite">サーバから取得中</p>
        </header>

        <div class="record-grid" id="record-list" aria-label="再生するサイン"></div>
      </section>

      <section class="stage" id="stage" hidden>
        <div class="stage-head">
          <div>
            <button id="back-button" type="button">選び直す</button>
          </div>
          <div>
            <p id="stage-status" role="status" aria-live="polite">待機中</p>
            <h2 id="title">未選択</h2>
          </div>
          <div class="stage-actions">
            <button id="replay-button" type="button">もう一度</button>
            <button id="clear-button" type="button">白紙</button>
          </div>
        </div>
        <div class="canvas-wrap">
          <canvas id="replay-canvas"></canvas>
        </div>

        <input id="speed-input" type="hidden" value="1" />
        <input id="auto-clear-input" type="checkbox" checked hidden />
      </section>
    </main>

    <script src="./replay.js"></script>
  </body>
</html>
